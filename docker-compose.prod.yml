version: '3.8'

services:
  db:
    image: postgres:15
    container_name: codebeast_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: codebeast
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: codebeast_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: codebeast_ollama_prod
    ports:
      - "11434:11434"
    volumes:
      - ollama_prod_data:/root/.ollama
    restart: always
    # Enable NVIDIA GPU acceleration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: codebeast_api_prod
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/codebeast
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: codebeast_celery_prod
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/codebeast
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - db
      - redis
      - ollama
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codebeast_frontend_prod
    ports:
      - "3000:3000"
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
  ollama_prod_data:
